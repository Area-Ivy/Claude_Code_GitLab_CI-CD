stages:
  - review
  - ai

claude-code-review:
  stage: review
  tags:
    - claude
    - code-review
  
  image: node:20
  
  variables:
    ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
    ANTHROPIC_BASE_URL: $ANTHROPIC_BASE_URL
    CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
    # ===== Skill 仓库配置 =====
    # 在 GitLab CI/CD Settings > Variables 中设置：
    #   SKILLS_REPO_URL: 外部 skills 仓库地址（如 https://git.meetsocial.cn/adtech/claude-skills.git）
    #   SKILLS_REPO_TOKEN: 访问该仓库的 Token（如果是私有仓库）
    #   SKILLS_REPO_BRANCH: 分支名（可选，默认 main）
  
  rules:
    # 每次 push 时触发（排除 main/master 分支，可选）
    # - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "master"
    
    # 或者：所有分支的 push 都触发
    # - if: $CI_PIPELINE_SOURCE == "push"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  
  cache:
    key: claude-cli
    paths:
      - /root/.npm
  
  before_script:
    - npm install -g @anthropic-ai/claude-code
    
    # ===== Skill 集成：从外部 Git 仓库拉取到 /root/.claude/skills/ =====
    - |
      mkdir -p /root/.claude/skills

      if [ -n "$SKILLS_REPO_URL" ]; then
        echo "📦 从外部仓库拉取 skills..."
        BRANCH="${SKILLS_REPO_BRANCH:-main}"

        if [ -n "$SKILLS_REPO_TOKEN" ]; then
          CLONE_URL=$(echo "$SKILLS_REPO_URL" | sed "s|https://|https://gitlab-ci-token:${SKILLS_REPO_TOKEN}@|")
        else
          CLONE_URL="$SKILLS_REPO_URL"
        fi

        git clone --depth=1 --branch "$BRANCH" "$CLONE_URL" /tmp/skills-repo 2>&1 && {
          # 将仓库中的 skill 目录复制到 /root/.claude/skills/
          find /tmp/skills-repo -maxdepth 2 -name "SKILL.md" -printf '%h\n' | while read skill_dir; do
            skill_name=$(basename "$skill_dir")
            mkdir -p /root/.claude/skills/"$skill_name"
            cp -r "$skill_dir"/* /root/.claude/skills/"$skill_name"/
            echo "  ✓ 已加载 skill: $skill_name"
          done
        } || echo "⚠️ 克隆外部 skills 仓库失败"
      else
        echo "⚠️ 未设置 SKILLS_REPO_URL，跳过 skill 拉取"
      fi

      # 汇总已加载的 skills
      echo "📋 /root/.claude/skills/ 中的 skills："
      find /root/.claude/skills -name "SKILL.md" -exec echo "  ✓ {}" \; 2>/dev/null || echo "  （无）"
  
  script:
    # 获取本次 push 的变更（对比上一次 commit）
    - |
      if [ "$CI_COMMIT_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
        # 新分支的第一次提交，对比默认分支
        git fetch origin $CI_DEFAULT_BRANCH
        CHANGED_FILES=$(git diff --name-only origin/$CI_DEFAULT_BRANCH...HEAD)
        DIFF_CONTENT=$(git diff origin/$CI_DEFAULT_BRANCH...HEAD)
      else
        # 普通提交，对比上一次 commit
        CHANGED_FILES=$(git diff --name-only $CI_COMMIT_BEFORE_SHA...$CI_COMMIT_SHA)
        DIFF_CONTENT=$(git diff $CI_COMMIT_BEFORE_SHA...$CI_COMMIT_SHA)
      fi
    
    - echo "变更的文件：$CHANGED_FILES"
    
    # 如果没有变更文件，跳过审查
    - |
      if [ -z "$CHANGED_FILES" ]; then
        echo "没有代码变更，跳过审查"
        exit 0
      fi
    
    # 调用 Claude 进行代码审查（Claude Code 会自动发现 .claude/skills/ 下的 SKILL.md）
    - |
      claude --print "
      /coding-standards

      提交信息：$CI_COMMIT_MESSAGE
      提交者：$CI_COMMIT_AUTHOR
      分支：$CI_COMMIT_BRANCH
      
      变更文件列表：
      $CHANGED_FILES
      
      代码变更内容：
      $DIFF_CONTENT
      
      " | tee review_result.md
  
  artifacts:
    paths:
      - review_result.md
    expire_in: 1 week

# ============================================================
# @claude Issue / MR 交互作业（基于官方文档 Quick Setup）
# https://code.claude.com/docs/en/gitlab-ci-cd
#
# 触发方式：
#   - Web UI 手动运行（CI/CD → Pipelines → Run pipeline）
#   - MR 事件自动触发
#   - Webhook 监听 @claude 评论后通过 Pipeline Trigger API 调用
# ============================================================
claude-on-issue:
  stage: ai
  tags:
    - claude
    - code-review

  image: node:24

  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

  variables:
    ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
    ANTHROPIC_BASE_URL: $ANTHROPIC_BASE_URL
    GIT_STRATEGY: fetch

  before_script:
    - npm install -g @anthropic-ai/claude-code

    # 配置 Git 推送权限
    - |
      if [ -n "$GITLAB_ACCESS_TOKEN" ]; then
        git config --global user.email "claude-bot@meetsocial.cn"
        git config --global user.name "Claude Bot"
        REPO_URL=$(echo "$CI_REPOSITORY_URL" | sed "s|.*@|https://oauth2:${GITLAB_ACCESS_TOKEN}@|" | sed "s|\.git$||").git
        git remote set-url origin "$REPO_URL"
        echo "✅ Git 推送权限已配置"
        # 验证 Token 是否有效
        echo "🔍 验证 GitLab Access Token 权限..."
        HTTP_CODE=$(curl -s -o /tmp/token_check.json -w "%{http_code}" \
          --header "PRIVATE-TOKEN: $GITLAB_ACCESS_TOKEN" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}")
        if [ "$HTTP_CODE" = "200" ]; then
          PROJECT_NAME=$(cat /tmp/token_check.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('path_with_namespace','unknown'))" 2>/dev/null || echo "unknown")
          echo "✅ Token 有效，项目: $PROJECT_NAME"
        else
          echo "❌ Token 验证失败！HTTP $HTTP_CODE"
          echo "   响应内容: $(cat /tmp/token_check.json 2>/dev/null)"
          echo "   请检查："
          echo "   1. GITLAB_ACCESS_TOKEN 是否已在项目 CI/CD Variables 中配置"
          echo "   2. Protected 标志是否已关闭（Trigger 触发的 Pipeline 可能不在 Protected branch 上）"
          echo "   3. Token 是否有 api + write_repository scope"
          echo "   4. Token 对应用户是否对 project_id=${CI_PROJECT_ID} 有 Developer 以上权限"
        fi
        rm -f /tmp/token_check.json
      else
        echo "⚠️ 未设置 GITLAB_ACCESS_TOKEN，Claude 将无法推送代码或调用 GitLab API"
        echo "   请在项目 CI/CD > Variables 中添加 GITLAB_ACCESS_TOKEN（scope: api + write_repository，Protected: 关闭）"
      fi

    # ===== 配置 GitLab MCP Server =====
    # 通过 settings.json 让 Claude Code 自动启动 @modelcontextprotocol/server-gitlab
    # 这样 Claude 就能用 mcp__gitlab 工具（创建 MR、发评论、管理 Issue 等）
    - |
      echo "🔧 配置 GitLab MCP Server..."
      mkdir -p /root/.claude
      cat > /root/.claude/settings.json << 'MCPEOF'
      {
        "mcpServers": {
          "gitlab": {
            "command": "npx",
            "args": ["-y", "@modelcontextprotocol/server-gitlab"],
            "env": {
              "GITLAB_PERSONAL_ACCESS_TOKEN": "${GITLAB_ACCESS_TOKEN}",
              "GITLAB_API_URL": "${CI_API_V4_URL}"
            }
          }
        }
      }
      MCPEOF
      # 用实际环境变量替换占位符
      sed -i "s|\${GITLAB_ACCESS_TOKEN}|${GITLAB_ACCESS_TOKEN}|g" /root/.claude/settings.json
      sed -i "s|\${CI_API_V4_URL}|${CI_API_V4_URL}|g" /root/.claude/settings.json
      echo "✅ MCP Server 配置完成"
      cat /root/.claude/settings.json | python3 -c "
      import sys,json
      cfg = json.load(sys.stdin)
      srv = cfg.get('mcpServers',{}).get('gitlab',{})
      env = srv.get('env',{})
      token = env.get('GITLAB_PERSONAL_ACCESS_TOKEN','')
      print(f'   API URL: {env.get(\"GITLAB_API_URL\",\"未设置\")}')
      print(f'   Token 前缀: {token[:8]}...' if len(token)>8 else f'   Token: {\"已设置\" if token else \"❌ 未设置\"}')
      " 2>/dev/null || true

    # ===== Skill 集成：从外部 Git 仓库拉取到 /root/.claude/skills/ =====
    - |
      mkdir -p /root/.claude/skills

      if [ -n "$SKILLS_REPO_URL" ]; then
        echo "📦 从外部仓库拉取 skills..."
        BRANCH="${SKILLS_REPO_BRANCH:-main}"

        if [ -n "$SKILLS_REPO_TOKEN" ]; then
          CLONE_URL=$(echo "$SKILLS_REPO_URL" | sed "s|https://|https://gitlab-ci-token:${SKILLS_REPO_TOKEN}@|")
        else
          CLONE_URL="$SKILLS_REPO_URL"
        fi

        git clone --depth=1 --branch "$BRANCH" "$CLONE_URL" /tmp/skills-repo 2>&1 && {
          # 将仓库中的 skill 目录复制到 /root/.claude/skills/
          find /tmp/skills-repo -maxdepth 2 -name "SKILL.md" -printf '%h\n' | while read skill_dir; do
            skill_name=$(basename "$skill_dir")
            mkdir -p /root/.claude/skills/"$skill_name"
            cp -r "$skill_dir"/* /root/.claude/skills/"$skill_name"/
            echo "  ✓ 已加载 skill: $skill_name"
          done
        } || echo "⚠️ 克隆外部 skills 仓库失败"
      else
        echo "⚠️ 未设置 SKILLS_REPO_URL，跳过 skill 拉取"
      fi

      # 汇总已加载的 skills
      echo "📋 /root/.claude/skills/ 中的 skills："
      find /root/.claude/skills -name "SKILL.md" -exec echo "  ✓ {}" \; 2>/dev/null || echo "  （无）"

  script:
    # 启动 GitLab MCP Server（提供 mcp__gitlab 工具：创建 MR、发评论等）
    - /bin/gitlab-mcp-server || true
    # 通过 web/API 触发时使用 AI_FLOW_* 上下文变量
    - echo "$AI_FLOW_INPUT for $AI_FLOW_CONTEXT on $AI_FLOW_EVENT"
    - >
      claude
      -p "${AI_FLOW_INPUT:-'Review this MR and implement the requested changes'}"
      --permission-mode acceptEdits
      --allowedTools "Bash Read Edit Write mcp__gitlab"
      --debug
